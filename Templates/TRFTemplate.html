<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <style>
        body {
            font-family: Arial;
            font-size: 12px;
            margin: 1px;
            color: #000;
            border:1px solid;
            padding:10px;
        }

        .title {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
            text-decoration: underline;
        }

        .box {
            border: 1px solid #000;
            padding: 10px;
            margin-bottom: 10px;
        }

        .row {
            margin-bottom: 5px;
        }

        .label {
            font-weight: bold;
            display: inline-block;
            min-width: 120px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        th, td {
            border: 1px solid #000;
            padding: 6px;
        }

        th {
            background: #eee;
        }

        .footer {
            margin-top: 40px;
            display: flex;
            justify-content: space-between;
            font-size: 13px;
        }
    </style>
</head>

<body>

    <div class="title">TEST REQUISITION FORM</div>

    <!-- 🔥 2 COLUMN PATIENT INFO -->
    <div class="box">

        <table style="width:100%; border:none;">
            <tr>
                <!-- LEFT SIDE -->
                <td style="border:none; width:50%; vertical-align: top;">
                    <div class="row"><span class="label">UHID:</span> {{UHID}}</div>
                    <div class="row"><span class="label">Patient:</span> {{PATIENT_NAME}}</div>
                    <div class="row"><span class="label">Age/Gender:</span> {{AGE}} / {{GENDER}}</div>
                    <div class="row"><span class="label">Contact:</span> {{CONTACT}}</div>
                    <div class="row"><span class="label">Address:</span> {{ADDRESS}}</div>
                </td>

                <!-- RIGHT SIDE -->
                <td style="border:none; width:50%; vertical-align: top;">
                    <!-- <div class="row"><span class="label">Visit:</span> {{VISIT_ID}}</div> -->
                    <!-- <div class="row"><span class="label">Diagnostic No:</span> {{DIAGNOSTIC_NO}}</div> -->
                    <div class="row"><span class="label">Bill Date:</span> {{BILL_DATE}}</div>
                    <div class="row"><span class="label">Client:</span> {{CLIENT}}</div>
                    <div class="row"><span class="label">Doctor:</span> {{DOCTOR}}</div>
                </td>
            </tr>
        </table>

    </div>

    <!-- 🔥 TEST TABLE -->
    <table>
        <thead>
            <tr>
                <th style="width:40px;">#</th>
                <th>Test Name</th>
                <th>Department</th>
                <th>Sample Type</th>
            </tr>
        </thead>
        <tbody>
            {{TEST_ROWS}}
        </tbody>
    </table>
</body>
</html>
